name: Release euler-v2-sdk

on:
  push:
    branches:
      - main
    paths:
      - "pnpm-workspace.yaml"
      - "packages/euler-v2-sdk/**"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-euler-v2-sdk
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PACKAGE_DIR: packages/euler-v2-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: packages/euler-v2-sdk/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release tag
        run: |
          VERSION="$(node -p "require('./$PACKAGE_DIR/package.json').version")"
          TAG_NAME="euler-v2-sdk-v$VERSION"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Check if already published
        id: check_published
        run: |
          VERSION="$(node -p "require('./$PACKAGE_DIR/package.json').version")"
          if npm view "euler-v2-sdk@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published, skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.check_published.outputs.skip != 'true'
        working-directory: packages/euler-v2-sdk
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q .; then
            echo "Tag $TAG_NAME already exists on remote, skipping."
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true
