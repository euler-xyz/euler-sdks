name: Release euler-v2-sdk

on:
  push:
    branches:
      - main
    paths:
      - "package-lock.json"
      - "packages/euler-v2-sdk/**"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-euler-v2-sdk
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PACKAGE_DIR: packages/euler-v2-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: |
            package-lock.json
            packages/euler-v2-sdk/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C "$PACKAGE_DIR" install --frozen-lockfile

      - name: Resolve release tag
        run: |
          VERSION="$(node -p "require('./$PACKAGE_DIR/package.json').version")"
          TAG_NAME="euler-v2-sdk-v$VERSION"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Publish package
        run: pnpm -C "$PACKAGE_DIR" publish

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true
