name: Release euler-v2-sdk

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version guard. If set, it must match packages/euler-v2-sdk/package.json.
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "pnpm-workspace.yaml"
      - "packages/euler-v2-sdk/**"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-euler-v2-sdk
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PACKAGE_DIR: packages/euler-v2-sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Require admin for manual publish
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Manual publishing is only allowed from main."
            exit 1
          fi

          PERMISSION="$(
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/collaborators/$GITHUB_ACTOR/permission" \
              | node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync(0, 'utf8')).permission)"
          )"

          if [ "$PERMISSION" != "admin" ]; then
            echo "Manual publishing is restricted to repository admins. $GITHUB_ACTOR has '$PERMISSION' permission."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: packages/euler-v2-sdk/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release tag
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$(node -p "require('./$PACKAGE_DIR/package.json').version")"

          if [ -n "$EXPECTED_VERSION" ] && [ "$EXPECTED_VERSION" != "$VERSION" ]; then
            echo "Requested version '$EXPECTED_VERSION' does not match package.json version '$VERSION'."
            exit 1
          fi

          TAG_NAME="euler-v2-sdk-v$VERSION"
          NPM_TAG="$(node -e "const version = process.argv[1]; const prerelease = version.split('-')[1]; console.log(prerelease ? prerelease.split('.')[0] : 'latest')" "$VERSION")"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"
          echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_ENV"

      - name: Check if already published
        id: check_published
        run: |
          if npm view "euler-v2-sdk@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published, skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.check_published.outputs.skip != 'true'
        working-directory: packages/euler-v2-sdk
        run: npm publish --access public --provenance --tag "$NPM_TAG"

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q .; then
            echo "Tag $TAG_NAME already exists on remote, skipping."
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true
