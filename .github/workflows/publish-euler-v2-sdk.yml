name: Publish euler-v2-sdk

on:
  push:
    tags:
      - "euler-v2-sdk-v*"
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next
          - beta
      dry_run:
        description: "Run publish in dry-run mode"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PACKAGE_DIR: packages/euler-v2-sdk
      PACKAGE_NAME: euler-v2-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: |
            package-lock.json
            packages/euler-v2-sdk/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C "$PACKAGE_DIR" install --frozen-lockfile

      - name: Verify tag version matches package.json
        if: startsWith(github.ref, 'refs/tags/euler-v2-sdk-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#euler-v2-sdk-v}"
          PKG_VERSION="$(node -p "require('./$PACKAGE_DIR/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Release checks
        run: pnpm -C "$PACKAGE_DIR" run release:check

      - name: Dry run publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: pnpm -C "$PACKAGE_DIR" publish --access public --provenance --tag "${{ inputs.dist_tag }}" --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish from tag
        if: startsWith(github.ref, 'refs/tags/euler-v2-sdk-v')
        run: pnpm -C "$PACKAGE_DIR" publish --access public --provenance --tag latest --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish from manual trigger
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == false
        run: pnpm -C "$PACKAGE_DIR" publish --access public --provenance --tag "${{ inputs.dist_tag }}" --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
