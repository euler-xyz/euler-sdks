name: Validate euler-v2-sdk PR

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/release-euler-v2-sdk.yml"
      - ".github/workflows/validate-euler-v2-sdk-pr.yml"
      - "package-lock.json"
      - "packages/euler-v2-sdk/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PACKAGE_DIR: packages/euler-v2-sdk
    outputs:
      package_changed: ${{ steps.package_changes.outputs.package_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            package-lock.json
            packages/euler-v2-sdk/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C "$PACKAGE_DIR" install --frozen-lockfile

      - name: Detect package changes
        id: package_changes
        run: |
          if git diff --quiet "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" -- "$PACKAGE_DIR"; then
            echo "package_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version was updated
        if: steps.package_changes.outputs.package_changed == 'true'
        run: |
          BASE_VERSION="$(git show "${{ github.event.pull_request.base.sha }}:$PACKAGE_DIR/package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
          HEAD_VERSION="$(node -p "require('./$PACKAGE_DIR/package.json').version")"
          if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            echo "package.json version must be updated in PRs targeting master."
            exit 1
          fi

      - name: Verify changelog has release entry
        if: steps.package_changes.outputs.package_changed == 'true'
        run: |
          HEAD_VERSION="$(node -p "require('./$PACKAGE_DIR/package.json').version")"
          if ! rg -n "^## \\[$HEAD_VERSION\\]( |$)" "$PACKAGE_DIR/CHANGELOG.md" >/dev/null; then
            echo "CHANGELOG.md must contain a release entry for version $HEAD_VERSION."
            exit 1
          fi

      - name: Release checks
        run: pnpm -C "$PACKAGE_DIR" run release:check
